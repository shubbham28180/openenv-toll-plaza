name: toll-plaza-operations
version: 1.0.0
description: OpenEnv environment for toll plaza congestion management
entrypoint: environment.py:TollPlazaEnv

observation_model: models.Observation
action_model: models.Action
reward_model: models.Reward

max_episode_steps: 10

tasks:
  - id: easy
    difficulty: easy
    description: Reduce congestion in one overloaded lane

  - id: medium
    difficulty: medium
    description: Manage rush-hour traffic after one lane failure

  - id: hard
    difficulty: hard
    description: Clear an emergency vehicle during congestion